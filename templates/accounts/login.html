{% extends 'base.html' %}

{% block content %}
<div style="max-width: 420px; margin: 80px auto;">
    <div class="card">

        <div class="login-badge">
            <img src="/static/img/school-badge.jfif" alt="Jinja SSS Badge">
        </div>

        <div class="school-name">Jinja Senior Secondary School</div>
        <div class="school-motto">"Striving for Excellence"</div>

        <h2 style="text-align: center; justify-content: center; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 15px;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Report Card System Login
        </h2>

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label>Password</label>
                {{ form.password }}
            </div>

            {% if form.errors %}
                <div class="alert alert-error">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                    Invalid username or password.
                </div>
            {% endif %}

            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                Sign In
            </button>
                    <p style="text-align: center; margin-top: 15px; font-size: 12px;">
            <a href="{% url 'student_parent_login' %}" style="color: #1a237e;">
                Student/Parent Portal →
            </a>
        </p>
        </form>
    </div>
</div>
{% endblock %}
