{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
            <path d="M16 3.5L19.5 7 21 5.5"/>
        </svg>
        Add New Teacher
    </h2>
    <a href="{% url 'teacher_list' %}" style="color: #1a237e; text-decoration: none;">
        ← Back to Teachers
    </a>
</div>

<div class="card" style="max-width: 500px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>First Name *</label>
            <input type="text" name="first_name" class="form-control" placeholder="e.g., James" required>
        </div>
        <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="last_name" class="form-control" placeholder="e.g., Okafor">
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" class="form-control" placeholder="e.g., okafor@jinjasss.sc.ug" required>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" class="form-control" placeholder="e.g., +256712345678">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Teacher</button>
    </form>
</div>
{% endblock %}
