{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h2>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        School Settings
    </h2>
    <p>Update school information displayed on report cards</p>
    <a href="{% url 'admin_dashboard' %}" style="color: #1a237e; text-decoration: none;">
        ← Back to Dashboard
    </a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>School Name</label>
            <input type="text" name="school_name" class="form-control" value="{{ settings.SCHOOL_NAME }}">
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" name="school_address" class="form-control" value="{{ settings.SCHOOL_ADDRESS }}">
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="school_phone" class="form-control" value="{{ settings.SCHOOL_PHONE }}">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="school_email" class="form-control" value="{{ settings.SCHOOL_EMAIL }}">
        </div>
        <div class="form-group">
            <label>Motto</label>
            <input type="text" name="school_motto" class="form-control" value="{{ settings.SCHOOL_MOTTO }}">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Save Settings</button>
    </form>
</div>
{% endblock %}
